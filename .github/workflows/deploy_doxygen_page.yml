name: Doxygen GitHub Pages Deploy Action

on:
  workflow_dispatch:
  push:
      branches:
        - main
      paths:
        - '.github/workflows/deploy_doxygen_page.yml'
        - 'docs/doxygen/Doxyfile.cfg'
        - 'tools/xmake/build_documentation.lua'
        - 'src/**'
        - 'examples/**'
        - 'README.md'

jobs:
  generate_doxygen:
    name: Generate and Deploy Doxygen Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@e50494030a33fd120900e739f6418a48100cd6ce
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache-${{ runner.os }}'
          actions-cache-key: 'xmake-actions-cache-key-${{ runner.os }}-doxygen'
          package-cache: true
          package-cache-key: 'xmake-package-cache-key-${{ runner.os }}-doxygen'
          project-path: '.'
          build-cache: true
          build-cache-key: 'xmake-build-cache-key-${{ runner.os }}-doxygen'
          build-cache-path: 'build/.build_cache'

      - name: Install Doxygen
        # IMPORTANT: If you update the Doxygen version here, make sure to also update it in the tools/xmake/build_documentation.lua file.
        run: xmake require -yvD "doxygen 669aeeefca743c148e2d935b3d3c69535c7491e6"

      - name: Build documentation
        run: xmake build_documentation

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          publish_dir: ./docs/doxygen/output/html
