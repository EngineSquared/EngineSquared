PROJECT_NAME            =   "Engine²"
PROJECT_BRIEF           =   "Open-source game engine written in C++."
OUTPUT_DIRECTORY        =   docs/doxygen/output/

INPUT                   =   src/                \
                            examples/           \
                            README.md
RECURSIVE               =   YES
USE_MDFILE_AS_MAINPAGE  =   README.md

EXTRACT_ALL             =   YES
EXTRACT_PRIVATE         =   YES # Should we have documentation for private stuff? It could help users understand the inner workings of the engine, and it could also help contributors understand how to contribute to the engine.
EXTRACT_STATIC          =   YES

WARNINGS                =   YES
WARN_IF_UNDOCUMENTED    =   YES
WARN_IF_DOC_ERROR       =   YES
WARN_NO_PARAMDOC        =   YES

OPTIMIZE_OUTPUT_FOR_C   =   NO
BUILTIN_STL_SUPPORT     =   YES

GENERATE_HTML           =   YES
HTML_OUTPUT             =   html
GENERATE_LATEX          =   NO

# Style
HTML_EXTRA_STYLESHEET   =   docs/doxygen/doxygen-awesome-css/doxygen-awesome.css \
                            docs/doxygen/doxygen-awesome-css/doxygen-awesome-sidebar-only.css
HTML_COLORSTYLE         =   LIGHT
DISABLE_INDEX           =   NO
FULL_SIDEBAR            =   NO
